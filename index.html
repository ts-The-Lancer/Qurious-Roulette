<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傀異ルーレット Ver.1.1</title>
    <style>
        :root { --accent-color: #ff4757; --gray-color: #888888; }
        body {
            font-family: sans-serif; display: flex; justify-content: center;
            background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 15px;
            min-height: 100vh; box-sizing: border-box;
        }
        .container {
            background: #2d2d2d; padding: 20px; border-radius: 15px;
            width: 100%; max-width: 900px; text-align: center;
            border: 1px solid #444; display: flex; flex-direction: column; gap: 20px;
        }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .main-content { flex-direction: row; } .left-panel { flex: 1.2; } .right-panel { flex: 0.8; } }
        .display-group { background: #1e1e1e; border: 1px solid #444; border-radius: 10px; padding: 20px 10px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .now-box { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .now-ex { background: #444; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .now-name { font-size: 1.7rem; font-weight: bold; color: #fff; }
        .now-elem { font-size: 0.9rem; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 4px 15px; border-radius: 20px; background: rgba(255,255,255,0.03); }
        #prev-container { border-top: 1px dashed #333; padding-top: 15px; width: 85%; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .prev-name { font-size: 1.2rem; font-weight: bold; color: #999; }
        .main-btn { background-color: var(--accent-color); border: none; height: 65px; border-radius: 10px; cursor: pointer; width: 100%; color: white; font-size: 1.2rem; font-weight: bold; margin-top: 10px; }
        
        /* 記録リセットボタンのスタイル */
        .reset-btn { background: #444; border: 1px solid #555; color: #ccc; font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .reset-btn:hover { background: #555; color: #fff; }

        #settings-panel { display: none; text-align: left; background: #333; padding: 15px; border-radius: 10px; }
        .ex-filter-area { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; }
        .ex-filter-title { font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: #bbb; }
        .ex-btns { display: flex; flex-wrap: wrap; gap: 5px; }
        .ex-tag-btn { background: #444; border: 1px solid #555; color: #fff; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; flex: 1; min-width: 50px; text-align: center; }
        .ex-tag-btn:hover { background: #555; }

        .item-scroll { max-height: 350px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #444; margin-bottom: 10px; }
        .edit-row { padding: 10px 0; border-bottom: 1px solid #2a2a2a; }
        .input-text { background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; flex-grow: 1; font-size: 0.9rem; }
        .elem-selector { display: flex; flex-wrap: wrap; gap: 3px; padding-left: 28px; margin-top: 5px; }
        .elem-btn { background: #333; border: 1px solid #555; color: #888; font-size: 0.65rem; padding: 3px 6px; border-radius: 3px; cursor: pointer; }
        .elem-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .right-panel-box { background: #252525; padding: 15px; border-radius: 10px; border: 1px solid #444; height: 100%; box-sizing: border-box; }
        #history-list { overflow-y: auto; list-style: none; padding: 0; margin: 0; max-height: 480px; text-align: left; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .backup-area { background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid var(--accent-color); margin-top: 15px; }
        .backup-area textarea { width: 100%; height: 50px; background: #222; color: #ccc; border: 1px solid #444; font-size: 0.7rem; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <div style="width:25px"></div>
        <h1>傀異ルーレット Ver.1.1</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <input type="color" id="colorPicker" value="#ff4757">
            <button onclick="toggleSettings()" style="background:none; border:none; color:#888; cursor:pointer; font-size:1.2rem;">⚙️</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="ex-filter-area">
            <div class="ex-filter-title">EXレベル一括選択</div>
            <div class="ex-btns">
                <button class="ex-tag-btn" onclick="filterByEX('1')">EX1</button>
                <button class="ex-tag-btn" onclick="filterByEX('2')">EX2</button>
                <button class="ex-tag-btn" onclick="filterByEX('3')">EX3</button>
                <button class="ex-tag-btn" onclick="filterByEX('4')">EX4</button>
                <button class="ex-tag-btn" onclick="filterByEX('5')">EX5</button>
                <button class="ex-tag-btn" onclick="filterByEX('6')">EX6</button>
                <button class="ex-tag-btn" onclick="filterByEX('7')">EX7</button>
                <button class="ex-tag-btn" onclick="filterByEX('8')">EX8</button>
                <button class="ex-tag-btn" onclick="filterByEX('9')">EX9</button>
            </div>
        </div>

        <div style="margin-bottom:12px; display:flex; gap:8px;">
            <button onclick="addNewItem()">＋追加</button>
            <button onclick="selectAll(true)">全有効</button>
            <button onclick="selectAll(false)">全無効</button>
        </div>
        <div id="edit-list-container" class="item-scroll"></div>
        
        <div class="backup-area">
            <div style="font-size:0.75rem; font-weight:bold; color:var(--accent-color);">データの引き継ぎ</div>
            <textarea id="backup-code" readonly onclick="this.select()" placeholder="コード発行ボタンを押してください"></textarea>
            <div style="display:flex; gap:5px;">
                <button onclick="exportData()" style="font-size:0.7rem;">コードを発行</button>
                <button onclick="importData()" style="font-size:0.7rem;">コードから復元</button>
            </div>
        </div>
        <button class="main-btn" style="height:40px; margin-top:15px; font-size:0.9rem;" onclick="toggleSettings()">完了して保存</button>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div class="display-group">
                <div class="now-box">
                    <div id="res-ex" class="now-ex" style="visibility:hidden">EX-</div>
                    <div id="res-name" class="now-name">ターゲット</div>
                    <div id="res-elem" class="now-elem" style="visibility:hidden">-</div>
                </div>
                <div id="prev-container" style="display:none;">
                    <div style="font-size:0.65rem; color:#666;">前回のターゲット</div>
                    <div id="pre-name" class="prev-name">-</div>
                </div>
            </div>
            <p style="font-size:0.8rem; color:#888; margin: 15px 0;">合計討伐: <span id="total-count">0</span></p>
            <button class="main-btn" onclick="draw()">ルーレットを回す</button>
        </div>
        <div class="right-panel">
            <div class="right-panel-box">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid var(--accent-color); padding-bottom:5px;">
                    <span style="font-weight:bold;">討伐記録</span>
                    <button class="reset-btn" onclick="resetStatsOnly()">記録リセット</button>
                </div>
                <ul id="history-list"></ul>
            </div>
        </div>
    </div>
</div>

<script>
const elementsList = ["火", "水", "雷", "氷", "龍", "毒", "麻痺", "睡眠", "爆破", "なし"];
const defaultData = [
    {ex:"1", name:"オサイズチ", elems:["雷"], enabled:true}, {ex:"1", name:"ドスバギィ", elems:["火"], enabled:true}, {ex:"1", name:"クルルヤック", elems:["水"], enabled:true}, {ex:"1", name:"ドスフロギィ", elems:["氷"], enabled:true}, {ex:"1", name:"アオアシラ", elems:["火"], enabled:true}, {ex:"1", name:"ウルクスス", elems:["火"], enabled:true}, {ex:"1", name:"ラングロトラ", elems:["水"], enabled:true}, {ex:"2", name:"アケノシルム", elems:["水"], enabled:true}, {ex:"2", name:"ロアルドロス", elems:["火"], enabled:true}, {ex:"2", name:"ボルボロス", elems:["火"], enabled:true}, {ex:"2", name:"ダイミョウザザミ", elems:["雷"], enabled:true}, {ex:"2", name:"フルフル", elems:["火"], enabled:true}, {ex:"2", name:"ヨツミワドウ", elems:["雷"], enabled:true}, {ex:"2", name:"ビシュテンゴ", elems:["氷"], enabled:true}, {ex:"3", name:"ビシュテンゴ亜種", elems:["水"], enabled:true}, {ex:"3", name:"プケプケ", elems:["雷"], enabled:true}, {ex:"3", name:"ジュラトドス", elems:["爆破"], enabled:true}, {ex:"2", name:"バサルモス", elems:["龍"], enabled:true}, {ex:"3", name:"イソネミクニ", elems:["雷"], enabled:true}, {ex:"4", name:"イソネミクニ亜種", elems:["火"], enabled:true}, {ex:"3", name:"リオレイア", elems:["龍"], enabled:true}, {ex:"7", name:"リオレイア希少種", elems:["雷"], enabled:true}, {ex:"4", name:"ベリオロス", elems:["火"], enabled:true}, {ex:"3", name:"トビカガチ", elems:["水"], enabled:true}, {ex:"4", name:"マガイマガド", elems:["水"], enabled:true}, {ex:"7", name:"マガイマガド(怨嗟)", elems:["水"], enabled:true}, {ex:"3", name:"アンジャナフ", elems:["水"], enabled:true}, {ex:"4", name:"ナルガクルガ", elems:["雷"], enabled:true}, {ex:"5", name:"タマミツネ", elems:["雷"], enabled:true}, {ex:"4", name:"ゴシャハギ", elems:["火"], enabled:true}, {ex:"4", name:"ガランゴルム", elems:["雷"], enabled:true}, {ex:"3", name:"ショウグンギザミ", elems:["雷"], enabled:true}, {ex:"5", name:"リオレウス", elems:["龍"], enabled:true}, {ex:"7", name:"リオレウス希少種", elems:["水"], enabled:true}, {ex:"4", name:"オロミドロ", elems:["火"], enabled:true}, {ex:"5", name:"オロミドロ亜種", elems:["水"], enabled:true}, {ex:"5", name:"ジンオウガ", elems:["氷"], enabled:true}, {ex:"5", name:"ルナガロン", elems:["火"], enabled:true}, {ex:"5", name:"ライゼクス", elems:["爆破"], enabled:true}, {ex:"6", name:"エスピナス", elems:["氷"], enabled:true}, {ex:"7", name:"エスピナス亜種", elems:["水"], enabled:true}, {ex:"6", name:"ゴア・マガラ", elems:["火"], enabled:true}, {ex:"8", name:"ゴア・マガラ(混沌)", elems:["龍"], enabled:true}, {ex:"5", name:"セルレギオス", elems:["雷"], enabled:true}, {ex:"5", name:"ティガレックス", elems:["雷"], enabled:true}, {ex:"5", name:"ディアブロス", elems:["氷"], enabled:true}, {ex:"4", name:"ヤツカダキ", elems:["氷"], enabled:true}, {ex:"6", name:"ヤツカダキ亜種", elems:["水"], enabled:true}, {ex:"8", name:"クシャルダオラ", elems:["雷"], enabled:true}, {ex:"8", name:"オオナズチ", elems:["火"], enabled:true}, {ex:"8", name:"テオ・テスカトル", elems:["水"], enabled:true}, {ex:"9", name:"シャガルマガラ", elems:["龍"], enabled:true}, {ex:"6", name:"ラージャン", elems:["氷"], enabled:true}, {ex:"7", name:"ラージャン(激昂)", elems:["氷"], enabled:true}, {ex:"6", name:"バゼルギウス", elems:["雷"], enabled:true}, {ex:"7", name:"バゼルギウス(紅蓮)", elems:["氷"], enabled:true}, {ex:"9", name:"バルファルク", elems:["爆破"], enabled:true}
];

let state = {
    monsters: JSON.parse(localStorage.getItem('MHR_V12_DATA')) || defaultData,
    stats: JSON.parse(localStorage.getItem('MHR_V12_STATS')) || {},
    curIdx: localStorage.getItem('MHR_V12_CUR'),
    preIdx: localStorage.getItem('MHR_V12_PRE'),
    theme: localStorage.getItem('MHR_V12_THEME') || '#ff4757'
};

function save() {
    localStorage.setItem('MHR_V12_DATA', JSON.stringify(state.monsters));
    localStorage.setItem('MHR_V12_STATS', JSON.stringify(state.stats));
    localStorage.setItem('MHR_V12_CUR', state.curIdx || '');
    localStorage.setItem('MHR_V12_PRE', state.preIdx || '');
    localStorage.setItem('MHR_V12_THEME', state.theme);
}

function resetStatsOnly() {
    if(confirm("これまでの討伐記録をすべてリセットしますか？\n（設定は維持されます）")){
        state.stats = {};
        state.curIdx = null;
        state.preIdx = null;
        save();
        location.reload();
    }
}

function filterByEX(level) {
    const targetMonsters = state.monsters.filter(m => m.ex === level);
    const allEnabled = targetMonsters.every(m => m.enabled);
    targetMonsters.forEach(m => m.enabled = !allEnabled);
    save();
    renderSettings();
}

function exportData() {
    const dataStr = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
    document.getElementById('backup-code').value = dataStr;
    alert("バックアップコードを発行しました。");
}

function importData() {
    const code = prompt("バックアップコードを入力してください：");
    if(!code) return;
    try {
        const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
        if(confirm("データを上書き復元しますか？")) {
            state = decoded; save(); location.reload();
        }
    } catch(e) { alert("無効なコードです。"); }
}

function refreshDisplay() {
    const cur = state.monsters[state.curIdx];
    if(cur) {
        document.getElementById('res-name').innerText = cur.name;
        document.getElementById('res-ex').innerText = 'EX' + cur.ex;
        document.getElementById('res-ex').style.visibility = "visible";
        document.getElementById('res-elem').innerText = "おすすめ：" + cur.elems.join(' / ');
        document.getElementById('res-elem').style.visibility = "visible";
    }
    const pre = state.monsters[state.preIdx];
    if(pre) {
        document.getElementById('pre-name').innerText = pre.name;
        document.getElementById('prev-container').style.display = 'flex';
    }
    let total = 0;
    for(let k in state.stats) total += state.stats[k];
    document.getElementById('total-count').innerText = total;
    renderHistory();
}

function draw() {
    const pool = state.monsters.map((m, i) => ({...m, originalIdx: i})).filter(m => m.enabled);
    if(pool.length === 0) return alert("有効なモンスターが選択されていません");
    if(state.curIdx !== null) state.preIdx = state.curIdx;
    const selected = pool[Math.floor(Math.random() * pool.length)];
    state.curIdx = selected.originalIdx;
    state.stats[state.curIdx] = (state.stats[state.curIdx] || 0) + 1;
    save(); refreshDisplay();
}

function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = "";
    state.monsters.forEach((m, i) => {
        if(state.stats[i] > 0) {
            const li = document.createElement('li'); li.className = 'history-item';
            li.innerHTML = `<span>${m.name} (EX${m.ex})</span><span class="history-count">${state.stats[i]}</span>`;
            list.appendChild(li);
        }
    });
}

function toggleSettings() {
    const p = document.getElementById('settings-panel');
    if(p.style.display === 'block') {
        save(); p.style.display = 'none'; refreshDisplay();
    } else {
        renderSettings(); p.style.display = 'block';
    }
}

function renderSettings() {
    const container = document.getElementById('edit-list-container');
    container.innerHTML = "";
    state.monsters.forEach((m, i) => {
        const div = document.createElement('div'); div.className = 'edit-row';
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="checkbox" ${m.enabled?'checked':''} onchange="state.monsters[${i}].enabled=this.checked; save();">
                <span style="font-size:0.7rem; color:#aaa; min-width:25px;">EX${m.ex}</span>
                <input type="text" class="input-text" value="${m.name}" oninput="state.monsters[${i}].name=this.value; save();">
                <span onclick="delItem(${i})" style="cursor:pointer; color:#777">×</span>
            </div>
            <div class="elem-selector" id="elems-${i}"></div>
        `;
        const sel = div.querySelector(`#elems-${i}`);
        elementsList.forEach(el => {
            const btn = document.createElement('button');
            btn.className = 'elem-btn' + (m.elems.includes(el) ? ' active' : '');
            btn.innerText = el;
            btn.onclick = () => {
                if(el === "なし") m.elems = ["なし"];
                else {
                    m.elems = m.elems.filter(x => x !== "なし");
                    if(m.elems.includes(el)) m.elems = m.elems.filter(x => x !== el);
                    else { if(m.elems.length >= 2) m.elems.shift(); m.elems.push(el); }
                    if(m.elems.length === 0) m.elems = ["なし"];
                }
                save(); renderSettings();
            };
            sel.appendChild(btn);
        });
        container.appendChild(div);
    });
}

function addNewItem() { 
    const exLevel = prompt("EXレベルを入力してください(1-9):", "1");
    state.monsters.push({ex:exLevel||"?", name:"新規", elems:["なし"], enabled:true}); 
    save(); renderSettings(); 
}
function delItem(i) { if(confirm("削除しますか？")){ state.monsters.splice(i,1); save(); renderSettings(); } }
function selectAll(b) { state.monsters.forEach(m => m.enabled = b); save(); renderSettings(); }

document.getElementById('colorPicker').oninput = (e) => {
    state.theme = e.target.value;
    document.documentElement.style.setProperty('--accent-color', state.theme);
    save();
};

document.documentElement.style.setProperty('--accent-color', state.theme);
document.getElementById('colorPicker').value = state.theme;
refreshDisplay();
</script>
</body>
</html>
