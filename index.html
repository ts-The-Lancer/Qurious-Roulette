<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傀異ルーレット Ver. 1.14</title>
    <style>
        :root { --accent-color: #ff4757; }
        body {
            font-family: sans-serif; display: flex; justify-content: center;
            background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 15px;
            min-height: 100vh; box-sizing: border-box;
        }
        .container {
            background: #2d2d2d; padding: 20px; border-radius: 15px;
            width: 100%; max-width: 900px; text-align: center;
            border: 1px solid #444; display: flex; flex-direction: column; gap: 20px;
        }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .main-content { flex-direction: row; } .left-panel { flex: 1.2; } .right-panel { flex: 0.8; } }
        
        #settings-panel { display: none; text-align: left; background: #333; padding: 15px; border-radius: 10px; border: 1px solid #555; }
        
        .search-container { background: #252525; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-bottom: 10px; }
        .search-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; font-weight: bold; }
        
        .index-grid { display: grid; gap: 4px; margin-bottom: 10px; }
        .ex-grid { grid-template-columns: repeat(9, 1fr); }
        .kana-grid { grid-template-columns: repeat(5, 1fr); }
        
        .index-btn { background: #444; border: 1px solid #555; color: #ccc; font-size: 0.75rem; padding: 6px 0; border-radius: 4px; cursor: pointer; }
        .index-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
        
        .item-scroll { max-height: 350px; overflow-y: auto; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #444; margin-bottom: 10px; }
        .edit-row { padding: 10px 8px; border-bottom: 1px solid #2a2a2a; transition: 0.2s; }
        .edit-row.disabled { opacity: 0.5; }
        
        .input-text { background: transparent; border: none; border-bottom: 1px solid #444; color: #fff; padding: 4px; flex-grow: 1; font-size: 0.9rem; }
        .elem-btn { background: #333; border: 1px solid #555; color: #888; font-size: 0.65rem; padding: 2px 5px; border-radius: 3px; cursor: pointer; }
        .elem-btn.active { background: var(--accent-color); color: white; }

        .main-btn { background-color: var(--accent-color); border: none; height: 60px; border-radius: 10px; cursor: pointer; width: 100%; color: white; font-size: 1.1rem; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 0 #b3323d; }
        .main-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b3323d; }
        
        .stats-info { font-size: 0.8rem; color: #aaa; margin: 10px 0; line-height: 1.6; }
        .stats-highlight { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <div style="width:25px"></div>
        <h1>傀異ルーレット Ver. 1.14</h1>
        <button onclick="toggleSettings()" style="background:none; border:none; color:#aaa; cursor:pointer; font-size:1.4rem;">⚙️</button>
    </div>

    <div id="settings-panel">
        <div class="search-container">
            <div class="search-label">EXレベル検索</div>
            <div class="index-grid ex-grid" id="ex-index"></div>
            
            <div class="search-label">頭文字検索（五十音順ソート）</div>
            <div class="index-grid kana-grid" id="kana-index"></div>

            <div style="display:flex; gap:5px;">
                <input type="text" id="free-search" style="background:#1a1a1a; border:1px solid #555; color:#fff; padding:8px; border-radius:4px; flex-grow:1; font-size:0.8rem;" placeholder="名前で検索..." oninput="renderSettings()">
                <button onclick="resetSearch()" style="background:#555; border:none; color:white; padding:0 10px; border-radius:4px; cursor:pointer; font-size:0.75rem;">解除</button>
            </div>
        </div>

        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button onclick="addNewItem()" style="background:#444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.75rem;">＋追加</button>
            <button onclick="selectAll(true)" style="background:#2ecc71; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.75rem;">表示分を有効</button>
            <button onclick="selectAll(false)" style="background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-size:0.75rem;">表示分を無効</button>
        </div>
        
        <div id="edit-list-container" class="item-scroll"></div>
        <button class="main-btn" style="height:40px; font-size:0.9rem;" onclick="toggleSettings()">保存して戻る</button>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div style="background:#1e1e1e; border:1px solid #444; border-radius:10px; padding:30px 10px; min-height:180px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;">
                <div id="res-ex" style="background:#444; color:#fff; font-size:0.7rem; padding:2px 8px; border-radius:4px; visibility:hidden;">EX-</div>
                <div id="res-name" style="font-size:1.8rem; font-weight:bold; color:#fff;">ターゲット</div>
                <div id="res-elem" style="font-size:0.85rem; color:var(--accent-color); border:1px solid var(--accent-color); padding:3px 12px; border-radius:20px; visibility:hidden;">-</div>
            </div>
            
            <div class="stats-info">
                合計討伐回数: <span id="total-count" class="stats-highlight">0</span> 回<br>
                有効: <span id="active-count" class="stats-highlight">0</span> / <span id="total-monsters">0</span>
            </div>
            
            <button class="main-btn" onclick="draw()">ルーレットを回す</button>
        </div>
        
        <div class="right-panel">
            <div style="background:#252525; padding:15px; border-radius:10px; border:1px solid #444; height:100%;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--accent-color); padding-bottom:5px; font-size:0.85rem;">
                    <b>討伐記録</b>
                    <button style="font-size:0.65rem; background:#444; color:#ccc; border:none; padding:2px 5px; cursor:pointer;" onclick="resetStatsOnly()">リセット</button>
                </div>
                <ul id="history-list" style="overflow-y:auto; list-style:none; padding:0; margin:10px 0 0 0; max-height:400px; text-align:left;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
const elementsList = ["火", "水", "雷", "氷", "龍", "毒", "麻痺", "睡眠", "爆破", "なし"];
const kanaGroups = [
    {label:"ア", res:/^[ア-オ]/}, {label:"カ", res:/^[カ-コガ-ゴ]/}, {label:"サ", res:/^[サ-ソザ-ゾ]/}, 
    {label:"タ", res:/^[タ-トダ-ド]/}, {label:"ナ", res:/^[ナ-ノ]/}, {label:"ハ", res:/^[ハ-ホバ-ボパ-ポ]/}, 
    {label:"マ", res:/^[マ-モ]/}, {label:"ヤ", res:/^[ヤ-ヨ]/}, {label:"ラ", res:/^[ラ-ロ]/}, {label:"ワ", res:/^[ワ]/}
];
const defaultData = [
    {ex:"1", name:"オサイズチ", elems:["雷"], enabled:true}, {ex:"1", name:"ドスバギィ", elems:["火"], enabled:true}, {ex:"1", name:"クルルヤック", elems:["水"], enabled:true}, {ex:"1", name:"ドスフロギィ", elems:["氷"], enabled:true}, {ex:"1", name:"アオアシラ", elems:["火"], enabled:true}, {ex:"1", name:"ウルクスス", elems:["火"], enabled:true}, {ex:"1", name:"ラングロトラ", elems:["水"], enabled:true}, {ex:"2", name:"アケノシルム", elems:["水"], enabled:true}, {ex:"2", name:"ロアルドロス", elems:["火"], enabled:true}, {ex:"2", name:"ボルボロス", elems:["火"], enabled:true}, {ex:"2", name:"ダイミョウザザミ", elems:["雷"], enabled:true}, {ex:"2", name:"フルフル", elems:["火"], enabled:true}, {ex:"2", name:"ヨツミワドウ", elems:["雷"], enabled:true}, {ex:"2", name:"ビシュテンゴ", elems:["氷"], enabled:true}, {ex:"3", name:"ビシュテンゴ亜種", elems:["水"], enabled:true}, {ex:"3", name:"プケプケ", elems:["雷"], enabled:true}, {ex:"3", name:"ジュラトドス", elems:["爆破"], enabled:true}, {ex:"2", name:"バサルモス", elems:["龍"], enabled:true}, {ex:"3", name:"イソネミクニ", elems:["雷"], enabled:true}, {ex:"4", name:"イソネミクニ亜種", elems:["火"], enabled:true}, {ex:"3", name:"リオレイア", elems:["龍"], enabled:true}, {ex:"7", name:"リオレイア希少種", elems:["雷"], enabled:true}, {ex:"4", name:"ベリオロス", elems:["火"], enabled:true}, {ex:"3", name:"トビカガチ", elems:["水"], enabled:true}, {ex:"4", name:"マガイマガド", elems:["水"], enabled:true}, {ex:"7", name:"マガイマガド(怨嗟)", elems:["水"], enabled:true}, {ex:"3", name:"アンジャナフ", elems:["水"], enabled:true}, {ex:"4", name:"ナルガクルガ", elems:["雷"], enabled:true}, {ex:"5", name:"タマミツネ", elems:["雷"], enabled:true}, {ex:"4", name:"ゴシャハギ", elems:["火"], enabled:true}, {ex:"4", name:"ガランゴルム", elems:["雷"], enabled:true}, {ex:"3", name:"ショウグンギザミ", elems:["雷"], enabled:true}, {ex:"5", name:"リオレウス", elems:["龍"], enabled:true}, {ex:"7", name:"リオレウス希少種", elems:["水"], enabled:true}, {ex:"4", name:"オロミドロ", elems:["火"], enabled:true}, {ex:"5", name:"オロミドロ亜種", elems:["水"], enabled:true}, {ex:"5", name:"ジンオウガ", elems:["氷"], enabled:true}, {ex:"5", name:"ルナガロン", elems:["火"], enabled:true}, {ex:"5", name:"ライゼクス", elems:["爆破"], enabled:true}, {ex:"6", name:"エスピナス", elems:["氷"], enabled:true}, {ex:"7", name:"エスピナス亜種", elems:["水"], enabled:true}, {ex:"6", name:"ゴア・マガラ", elems:["火"], enabled:true}, {ex:"8", name:"ゴア・マガラ(混沌)", elems:["龍"], enabled:true}, {ex:"5", name:"セルレギオス", elems:["雷"], enabled:true}, {ex:"5", name:"ティガレックス", elems:["雷"], enabled:true}, {ex:"5", name:"ディアブロス", elems:["氷"], enabled:true}, {ex:"4", name:"ヤツカダキ", elems:["氷"], enabled:true}, {ex:"6", name:"ヤツカダキ亜種", elems:["水"], enabled:true}, {ex:"8", name:"クシャルダオラ", elems:["雷"], enabled:true}, {ex:"8", name:"オオナズチ", elems:["火"], enabled:true}, {ex:"8", name:"テオ・テスカトル", elems:["水"], enabled:true}, {ex:"9", name:"シャガルマガラ", elems:["龍"], enabled:true}, {ex:"6", name:"ラージャン", elems:["氷"], enabled:true}, {ex:"7", name:"ラージャン(激昂)", elems:["氷"], enabled:true}, {ex:"6", name:"バゼルギウス", elems:["雷"], enabled:true}, {ex:"7", name:"バゼルギウス(紅蓮)", elems:["氷"], enabled:true}, {ex:"9", name:"バルファルク", elems:["爆破"], enabled:true}
];

let state = {
    monsters: JSON.parse(localStorage.getItem('MHR_V14_DATA')) || defaultData,
    stats: JSON.parse(localStorage.getItem('MHR_V14_STATS')) || {},
    curIdx: null,
    searchLevel: null,
    searchKana: null
};

function save() {
    localStorage.setItem('MHR_V14_DATA', JSON.stringify(state.monsters));
    localStorage.setItem('MHR_V14_STATS', JSON.stringify(state.stats));
}

function renderIndices() {
    const exBox = document.getElementById('ex-index');
    exBox.innerHTML = "";
    for(let i=1; i<=9; i++) {
        const btn = document.createElement('button');
        btn.className = 'index-btn' + (state.searchLevel == i ? ' active' : '');
        btn.innerText = 'EX' + i;
        btn.onclick = () => { state.searchLevel = (state.searchLevel == i) ? null : i; renderIndices(); renderSettings(); };
        exBox.appendChild(btn);
    }
    const kanaBox = document.getElementById('kana-index');
    kanaBox.innerHTML = "";
    kanaGroups.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'index-btn' + (state.searchKana == g.label ? ' active' : '');
        btn.innerText = g.label + '行';
        btn.onclick = () => { state.searchKana = (state.searchKana == g.label) ? null : g.label; renderIndices(); renderSettings(); };
        kanaBox.appendChild(btn);
    });
}

function resetSearch() {
    state.searchLevel = null; state.searchKana = null;
    document.getElementById('free-search').value = "";
    renderIndices(); renderSettings();
}

function getFiltered() {
    const free = document.getElementById('free-search').value.toLowerCase();
    const kanaRegex = state.searchKana ? kanaGroups.find(g => g.label === state.searchKana).res : null;
    let list = state.monsters.map((m, i) => ({...m, oid: i})).filter(m => {
        if(state.searchLevel && m.ex != state.searchLevel) return false;
        if(kanaRegex && !kanaRegex.test(m.name)) return false;
        if(free && !m.name.toLowerCase().includes(free)) return false;
        return true;
    });
    if(state.searchKana) {
        list.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    }
    return list;
}

function renderSettings() {
    const container = document.getElementById('edit-list-container');
    container.innerHTML = "";
    getFiltered().forEach(m => {
        const div = document.createElement('div');
        div.className = 'edit-row' + (m.enabled ? '' : ' disabled');
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="checkbox" ${m.enabled?'checked':''} onchange="toggleEnable(${m.oid}, this.checked)">
                <span style="font-size:0.7rem; color:#888; width:28px;">EX${m.ex}</span>
                <input type="text" class="input-text" value="${m.name}" oninput="state.monsters[${m.oid}].name=this.value; save();">
            </div>
            <div style="display:flex; gap:3px; margin-top:5px; margin-left:36px;" id="el-${m.oid}"></div>
        `;
        const sel = div.querySelector(`#el-${m.oid}`);
        elementsList.forEach(e => {
            const btn = document.createElement('button');
            btn.className = 'elem-btn' + (m.elems.includes(e) ? ' active' : '');
            btn.innerText = e;
            btn.onclick = () => { state.monsters[m.oid].elems = [e]; save(); renderSettings(); };
            sel.appendChild(btn);
        });
        container.appendChild(div);
    });
}

function toggleEnable(i, v) { state.monsters[i].enabled = v; save(); renderSettings(); }
function selectAll(b) { getFiltered().forEach(m => state.monsters[m.oid].enabled = b); save(); renderSettings(); }
function addNewItem() { 
    state.monsters.push({ex:state.searchLevel||"1", name:"新規", elems:["なし"], enabled:true}); 
    save(); renderSettings(); 
}

function toggleSettings() {
    const p = document.getElementById('settings-panel');
    if(p.style.display === 'block') { p.style.display = 'none'; refresh(); }
    else { renderIndices(); renderSettings(); p.style.display = 'block'; }
}

function refresh() {
    const cur = state.monsters[state.curIdx];
    if(cur) {
        document.getElementById('res-name').innerText = cur.name;
        document.getElementById('res-ex').innerText = 'EX' + cur.ex;
        document.getElementById('res-ex').style.visibility = "visible";
        document.getElementById('res-elem').innerText = "おすすめ：" + cur.elems[0];
        document.getElementById('res-elem').style.visibility = "visible";
    }
    
    // 合計回数計算
    const total = Object.values(state.stats).reduce((a, b) => a + b, 0);
    document.getElementById('total-count').innerText = total;
    document.getElementById('active-count').innerText = state.monsters.filter(m => m.enabled).length;
    document.getElementById('total-monsters').innerText = state.monsters.length;
    
    const list = document.getElementById('history-list'); list.innerHTML = "";
    state.monsters.forEach((m, i) => {
        if(state.stats[i] > 0) {
            const li = document.createElement('li'); 
            li.style.cssText = "display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333; font-size:0.8rem;";
            li.innerHTML = `<span>${m.name} <small style="color:#666;">(EX${m.ex})</small></span><span>${state.stats[i]}体</span>`;
            list.appendChild(li);
        }
    });
}

function draw() {
    const pool = state.monsters.map((m, i) => ({...m, idx: i})).filter(m => m.enabled);
    if(pool.length === 0) return alert("有効なモンスターを選択してください");
    const s = pool[Math.floor(Math.random() * pool.length)];
    state.curIdx = s.idx; state.stats[s.idx] = (state.stats[s.idx] || 0) + 1;
    save(); refresh();
}

function resetStatsOnly() { if(confirm("記録をリセットしますか？")){ state.stats = {}; save(); refresh(); } }
refresh();
</script>
</body>
</html>
